# Nevvmedia Yönetim — Coolify uyumlu Docker Compose
#
# Coolify reverse proxy (Traefik) ile dış erişimi otomatik yönetir,
# bu yüzden `ports:` yerine `expose:` kullanıyoruz.
# Domain'i Coolify'da resource ayarlarından bağlayın.

services:
  nevvmedia-app:
    build: .
    image: nevvmedia-yonetim:latest
    restart: unless-stopped
    depends_on:
      nevvmedia-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nevvmedia:${DB_PASSWORD:-change_me_in_env}@nevvmedia-postgres:5432/nevvmedia_yonetim?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      APP_NAME: ${APP_NAME:-Nevvmedia Yönetim}
      APP_URL: ${APP_URL:-http://localhost:3000}
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-25}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-info@nevvmedia.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Nevvmedia2026!}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Nevvmedia Yönetici}
    expose:
      - "3000"
    volumes:
      - nevvmedia-uploads:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/giris >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nevvmedia-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nevvmedia
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_env}
      POSTGRES_DB: nevvmedia_yonetim
    volumes:
      - nevvmedia-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nevvmedia -d nevvmedia_yonetim"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  nevvmedia-pgdata:
  nevvmedia-uploads:
